name: Update Latest Repos

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:

jobs:
  update-repos:
    runs-on: ubuntu-latest
    name: Update README with latest repositories

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and update repos section
        uses: actions/github-script@v7
        with:
          script: |
            const { data: repos } = await github.rest.repos.listForUser({
              username: 'SubhadipJana1409',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
              type: 'owner'
            });

            const excluded = ['SubhadipJana1409'];

            const filtered = repos
              .filter(r => !r.fork && !r.archived && !excluded.includes(r.name))
              .slice(0, 5);

            const timeAgo = (dateStr) => {
              const diff = Date.now() - new Date(dateStr).getTime();
              const days = Math.floor(diff / 86400000);
              if (days === 0) return 'today';
              if (days === 1) return '1 day ago';
              if (days < 30) return `${days} days ago`;
              const months = Math.floor(days / 30);
              if (months === 1) return '1 month ago';
              return `${months} months ago`;
            };

            let table = '| Repository | Description | Language | Updated |\n';
            table += '|------------|-------------|----------|---------|\n';

            for (const repo of filtered) {
              const name = `[${repo.name}](${repo.html_url})`;
              const desc = (repo.description || '—').replace(/\|/g, '\\|').substring(0, 80);
              const lang = repo.language || '—';
              const updated = timeAgo(repo.updated_at);
              table += `| ${name} | ${desc} | ${lang} | ${updated} |\n`;
            }

            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');

            const startMarker = '<!--START_SECTION:repos-->';
            const endMarker = '<!--END_SECTION:repos-->';
            const regex = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`, 'm');

            readme = readme.replace(regex, `${startMarker}\n${table}${endMarker}`);

            fs.writeFileSync('README.md', readme);

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet && exit 0 || true
          git add README.md
          git commit -m "📂 Update latest repositories"
          git push
